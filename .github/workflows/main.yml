name: Generate Unit Tests


on:
  workflow_dispatch:
  #pull_request:
    #types: [opened, synchronize]

jobs:
  generate-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pytest openai PyGithub requests requests-mock typed_ast pytest-cov GitPython coverage

     
      - name: Run test generator agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAT: ${{ secrets.PAT }}
        run: |
          python agent/generate_tests.py

          
      - name: Run tests
        run: pytest
